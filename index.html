let AC=null;
function beep(f,d=0.08,type='square',v=0.05){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=f;g.gain.value=v;
    o.connect(g);g.connect(AC.destination);o.start();
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
    o.stop(AC.currentTime+d);
  }catch(e){}
}

/* ================= マップ ================= */
const MW=48,MH=40;
// tile: 0草 1道 2木 3水 4岩山 5草むら(エンカウント) 6祠 7家 8門 9城 10砂 11赤土
let map=[];
function seedRand(s){return function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};}
function buildMap(){
  map=[];const R=seedRand(42);
  for(let y=0;y<MH;y++){map.push([]);for(let x=0;x<MW;x++){
    let t=0;
    if(x===0||y===0||x===MW-1||y===MH-1)t=4;
    map[y].push(t);
  }}
  const fill=(x1,y1,x2,y2,t)=>{for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)if(x>0&&y>0&&x<MW-1&&y<MH-1)map[y][x]=t;};
  // 地域の下地
  fill(2,30,45,38,11);            // 南=火 赤土
  fill(2,2,14,13,10);             // 北西寄りは砂地→水地方
  fill(5,3,17,10,3);              // 湖
  // 東の森(木)
  for(let y=2;y<38;y++)for(let x=33;x<47;x++){if(R()<0.34)map[y][x]=2;}
  // 西の岩場(金)
  for(let y=2;y<38;y++)for(let x=2;x<15;x++){if(map[y][x]!==3&&R()<0.18)map[y][x]=4;}
  // まばらな木
  for(let y=2;y<38;y++)for(let x=15;x<33;x++){if(R()<0.06)map[y][x]=2;}
  // 草むら(エンカウント)
  const bush=(x1,y1,x2,y2,p)=>{for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)if(map[y][x]===0||map[y][x]===10||map[y][x]===11){if(R()<p)map[y][x]=5;}};
  bush(34,10,45,30,0.35); bush(3,14,13,30,0.3); bush(16,26,32,29,0.4);
  bush(4,31,44,37,0.3); bush(18,3,31,12,0.3);
  // 道
  fill(2,20,45,20,1);  fill(24,6,24,37,1);
  // 村
  fill(19,16,29,24,1);
  map[17][20]=7;map[17][28]=7;map[23][20]=7;map[23][28]=7;
  // 城と門
  fill(20,5,28,5,4); map[5][24]=8;
  fill(22,2,26,4,9);
  // 祠
  const clear=(x,y)=>{for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const t=map[y+dy][x+dx];if(t===2||t===4||t===3)map[y+dy][x+dx]=0;}};
  const shrinePos={wood:[42,20],fire:[24,36],earth:[24,29],metal:[5,20],water:[14,12]};
  for(const k in shrinePos){const[sx,sy]=shrinePos[k];clear(sx,sy);map[sy][sx]=6;}
  // NPCの足元を確保
  for(const n of NPCS){clear(n.x,n.y);const t=map[n.y][n.x];if(t!==1)map[n.y][n.x]=0;}
  return shrinePos;
}
const SHRINES=buildMap();
const SHRINE_OF={};for(const k in SHRINES){SHRINE_OF[SHRINES[k][0]+','+SHRINES[k][1]]=k;}
function solid(x,y){
  if(x<0||y<0||x>=MW||y>=MH)return true;
  const t=map[y][x];
  if(t===8)return gs.orbCount()<5;
  return t===2||t===3||t===4||t===6||t===7||t===9;
}
function regionAt(x,y){
  if(y<=13)return 'water';
  if(y>=30)return 'fire';
  if(x<=14)return 'metal';
  if(x>=33)return 'wood';
  return 'earth';
}

  gs.lv=1;gs.hp=40;gs.maxhp=40;gs.exp=0;

  gs.defeated=0;gs.answered=0;gs.correct=0;gs.metNPC={};gs.bossDown=false;
}
const SAVEKEY='gozoRPG_v1';
function save(){
  try{localStorage.setItem(SAVEKEY,JSON.stringify({
    x:gs.x,y:gs.y,lv:gs.lv,hp:gs.hp,maxhp:gs.maxhp,exp:gs.exp,
    orbs:gs.orbs,defeated:gs.defeated,answered:gs.answered,correct:gs.correct,
    metNPC:gs.metNPC,bossDown:gs.bossDown}));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVEKEY));
    if(!d)return false;
    Object.assign(gs,{x:d.x,y:d.y,lv:d.lv,hp:d.hp,maxhp:d.maxhp,exp:d.exp,
      orbs:d.orbs,defeated:d.defeated,answered:d.answered,correct:d.correct,
      metNPC:d.metNPC||{},bossDown:!!d.bossDown});
    gs.px=gs.x*TS;gs.py=gs.y*TS;gs.moving=false;
    return true;
  }catch(e){return false;}
}
function hasSave(){try{return !!localStorage.getItem(SAVEKEY);}catch(e){return false;}}

/* ================= バトル ================= */
let battle=null;
function pickQuestion(cat){
  let pool;
  if(cat==='all'){pool=[];ALLCATS.forEach(c=>pool.push(...QUESTIONS[c]));}
  else{
    pool=Math.random()<0.7?QUESTIONS[cat]:QUESTIONS[Math.random()<0.5?'general':'meridian'];
  }
  const q=pool[Math.floor(Math.random()*pool.length)];
  // 選択肢シャッフル(c[0]が正解)
  const idx=[0,1,2,3].sort(()=>Math.random()-0.5);
  return {q:q.q,e:q.e,choices:idx.map(i=>q.c[i]),ans:idx.indexOf(0)};
}
function startBattle(key){
  const e=ENEMIES[key];
  battle={key,e,ehp:e.hp,phase:'intro',sel:0,cur:null,msg:e.name+" があらわれた！",fb:null,shake:0};
  state='battle';beep(200,.15,'square');setTimeout(()=>beep(150,.2,'square'),120);
}
function battleNextQuestion(){
  battle.cur=pickQuestion(battle.e.cat);
  battle.sel=0;battle.phase='q';
}
function battleAnswer(){
  const b=battle,correct=b.sel===b.cur.ans;
  gs.answered++;
  if(correct){
    gs.correct++;
    const d=gs.dmg()+Math.floor(Math.random()*4);
    b.ehp=Math.max(0,b.ehp-d);
    b.fb={ok:true,text:"せいかい！ "+d+"のダメージ！",exp:b.cur.e};
    b.shake=12;sfx.good();
  }else{
    const d=b.e.atk+Math.floor(Math.random()*3);
    gs.hp=Math.max(0,gs.hp-d);
    b.fb={ok:false,text:"ざんねん… 正解は「"+b.cur.choices[b.cur.ans]+"」\n"+d+"のダメージを受けた！",exp:b.cur.e};
    sfx.bad();
  }
  b.phase='feedback';
}
function battleProceed(){
  const b=battle;
  if(b.ehp<=0){
    b.phase='victory';
    if(b.e.boss){b.msg=b.e.name+" をたおした！！";sfx.win();}
    else{
      let m=b.e.name+" をたおした！";
      if(b.e.trial){gs.orbs[b.e.trial]=true;m+="\n「"+ELEMNAME[b.e.trial]+"の玉」を手に入れた！";sfx.orb();}
      else{gs.defeated++;sfx.win();}
      gs.exp+=b.e.exp;m+="\n経験値 "+b.e.exp+" を得た！";
      while(gs.exp>=gs.expNext()){
        gs.exp-=gs.expNext();gs.lv++;gs.maxhp+=8;gs.hp=gs.maxhp;
        m+="\nレベル "+gs.lv+" に上がった！ HPが全回復！";sfx.lvl();
      }
      b.msg=m;
    }
  }else if(gs.hp<=0){
    b.phase='defeat';
    b.msg="目の前が真っ暗になった…\n気がつくと村に戻っていた。";
  }else{
    battleNextQuestion();
  }
}
function endBattle(){
  const b=battle;
  if(b.phase==='defeat'){
    gs.x=24;gs.y=21;gs.px=gs.x*TS;gs.py=gs.y*TS;gs.dir='down';
    gs.hp=Math.floor(gs.maxhp/2);
    battle=null;state='explore';save();return;
  }
  if(b.e.boss){
    gs.bossDown=true;battle=null;save();startEnding();return;
  }
  battle=null;state='explore';save();
}
function tryEscape(){
  const b=battle;
  if(b.e.trial||b.e.boss){b.fb={ok:false,text:"逃げられない！",exp:""};b.phase='feedback';b.escaped=false;return;}
  if(Math.random()<0.5){b.phase='escape';b.msg="うまく にげだした！";sfx.sel();}
  else{
    const d=b.e.atk;gs.hp=Math.max(0,gs.hp-d);
    b.fb={ok:false,text:"回り込まれてしまった！\n"+d+"のダメージを受けた！",exp:""};
    b.phase='feedback';sfx.bad();
  }
}

  const release=e=>{e.preventDefault();keys[k]=false;};
  b.addEventListener('pointerdown',press);
  b.addEventListener('pointerup',release);
  b.addEventListener('pointercancel',release);
  b.addEventListener('pointerleave',release);
  b.addEventListener('contextmenu',e=>e.preventDefault());
});
function fitCanvas(){
  const vw=window.innerWidth,vh=window.innerHeight;
  // タッチ端末は下部パッドぶんの余白を確保
  const availH=isTouch&&vh>vw?vh*0.55:vh-12;
  const s=Math.min((vw-8)/W,availH/H);
  cv.style.width=Math.floor(W*s)+'px';
  cv.style.height=Math.floor(H*s)+'px';
}

const isConfirm=k=>k==='z'||k==='Z'||k==='Enter'||k===' ';
const isCancel=k=>k==='x'||k==='X'||k==='Escape';

let titleSel=0,titleHasSave=false;
function handleKey(k){
  if(state==='title'){
    if(k==='ArrowUp'||k==='ArrowDown'){titleSel=1-titleSel;sfx.sel();}
    if(isConfirm(k)){
      sfx.ok();
      if(titleSel===1&&titleHasSave&&load()){state='explore';}
      else{resetGame();state='explore';
        showDialog("？？？",["五行の里に ようこそ。\nまずは村の中央にいる村長に\n話を聞いてみよう。",
          isTouch?"【操作方法】\n十字キー: 移動 / A: 話す・調べる\nB: メニュー(学習資料はこちら)"
                 :"【操作方法】\n矢印キー: 移動 / Z: 話す・調べる\nX: メニュー(学習資料はこちら)"],null);
      }
    }
  }
  else if(state==='dialog'){
    if(isConfirm(k)){
      sfx.ok();dialog.i++;
      if(dialog.i>=dialog.pages.length){
        const cb=dialog.onEnd;dialog=null;state='explore';
        if(cb)cb();
      }
    }
  }
  else if(state==='explore'){
    if(isConfirm(k))interact();
    if(isCancel(k)){menu.page=0;state='menu';sfx.sel();save();}
  }
  else if(state==='menu'){
    if(isCancel(k)||isConfirm(k)&&false){state='explore';sfx.sel();}
    if(k==='ArrowLeft'){menu.page=(menu.page+MENUPAGES.length-1)%MENUPAGES.length;sfx.sel();}
    if(k==='ArrowRight'){menu.page=(menu.page+1)%MENUPAGES.length;sfx.sel();}
  }
  else if(state==='battle'){
    const b=battle;
    if(b.phase==='intro'&&isConfirm(k)){sfx.ok();battleNextQuestion();}
    else if(b.phase==='q'){
      if(k==='ArrowUp'){b.sel=(b.sel+3)%4;sfx.sel();}
      if(k==='ArrowDown'){b.sel=(b.sel+1)%4;sfx.sel();}
      if(isConfirm(k))battleAnswer();
      if(isCancel(k))tryEscape();
    }
    else if(b.phase==='feedback'&&isConfirm(k)){sfx.ok();battleProceed();}
    else if((b.phase==='victory'||b.phase==='defeat')&&isConfirm(k)){sfx.ok();endBattle();}
    else if(b.phase==='escape'&&isConfirm(k)){battle=null;state='explore';}
  }
  else if(state==='ending'){
    if(isConfirm(k)){
      sfx.ok();ending.page++;
      if(ending.page>=ending.pages.length){ending=null;state='explore';}
    }
  }
}

function interact(){
  const dx={left:-1,right:1,up:0,down:0}[gs.dir];
  const dy={left:0,right:0,up:-1,down:1}[gs.dir];
  const tx=gs.x+dx,ty=gs.y+dy;
  const npc=NPCS.find(n=>n.x===tx&&n.y===ty);
  if(npc){
    sfx.ok();gs.metNPC[npc.id]=true;
    const pages=npc.lines.slice();
    showDialog(npc.name,pages,()=>{
      if(npc.heal){gs.hp=gs.maxhp;sfx.lvl();save();}
    });
    return;
  }
  const t=(ty>=0&&ty<MH&&tx>=0&&tx<MW)?map[ty][tx]:-1;
  if(t===6){
    const elem=SHRINE_OF[tx+','+ty];
    if(gs.orbs[elem]){showDialog("祠",["「"+ELEMNAME[elem]+"の玉」は すでに手に入れた。\n祠は静かに輝いている…"],null);}
    else{
      showDialog(ELEMNAME[elem]+"の祠",["祠に触れると、まばゆい光と共に\n守護神が姿を現した…！\n(試練からは逃げられない)"],
        ()=>startBattle('g'+elem.charAt(0).toUpperCase()+elem.slice(1)));
    }
    return;
  }
  if(t===8){
    if(gs.orbCount()<5)showDialog("城門",["巨大な門は固く閉ざされている。\n五行の玉が5つ揃わねば開かぬようだ。\n(現在 "+gs.orbCount()+"/5)"],null);
    return;
  }
  if(t===9){
    if(gs.bossDown){showDialog("城",["病魔王は去り、城は静まり返っている。"],null);}
    else{
      showDialog("？？？",["よくぞ来たな、小さき学徒よ…。\nわしは病魔王。知識なき者に\n生きる資格はない！",
        "五臓六腑と経絡、その全てを\n答えてみせよ！！"],()=>startBattle('boss'));
    }
    return;
  }
}
function updateExplore(){
  if(gs.moving){
    const spd=4;
    const txp=gs.x*TS,typ=gs.y*TS;
    if(gs.px<txp)gs.px=Math.min(txp,gs.px+spd);
    if(gs.px>txp)gs.px=Math.max(txp,gs.px-spd);
    if(gs.py<typ)gs.py=Math.min(typ,gs.py+spd);
    if(gs.py>typ)gs.py=Math.max(typ,gs.py-spd);
    if(gs.px===txp&&gs.py===typ){
      gs.moving=false;
      // エンカウント判定
      const t=map[gs.y][gs.x];
      if(t===5&&Math.random()<0.13){
        const r=regionAt(gs.x,gs.y);
        let key=REGION_ENEMY[r];
        if(Math.random()<0.2)key='shoja'; // 暑邪はどこにでも
        startBattle(key);return;
      }
    }
    gs.step++;
    return;
  }
  let dx=0,dy=0,dir=null;
  if(keys['ArrowUp']||keys['w']){dy=-1;dir='up';}
  else if(keys['ArrowDown']||keys['s']){dy=1;dir='down';}
  else if(keys['ArrowLeft']||keys['a']){dx=-1;dir='left';}
  else if(keys['ArrowRight']||keys['d']){dx=1;dir='right';}
  if(dir){
    gs.dir=dir;
    const nx=gs.x+dx,ny=gs.y+dy;
    if(!solid(nx,ny)&&!NPCS.some(n=>n.x===nx&&n.y===ny)){
      gs.x=nx;gs.y=ny;gs.moving=true;
    }
  }
}

function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function drawArt(art,pal,x,y,s){
  const a=ART[art];
  for(let r=0;r<a.length;r++)for(let c=0;c<a[r].length;c++){
    const ch=a[r][c];if(ch==='.')continue;
    px(x+c*s,y+r*s,s,s,pal[ch]||'#f0f');
  }
}
function hash2(x,y){let h=(x*374761393+y*668265263)|0;h=(h^(h>>13))*1274126177;h=h^(h>>16);return (h>>>0)/4294967295;}
function drawTile(t,sx,sy,wx,wy){
  const r=hash2(wx,wy);
  switch(t){
    case 0:case 2:case 6:case 7: // 草地ベース
      px(sx,sy,TS,TS,'#3f8f3f');
      if(r<0.3)px(sx+8+((r*97)|0)%14,sy+6+((r*53)|0)%18,4,4,'#357a35');
      break;
    case 1: px(sx,sy,TS,TS,'#c9b078');
      if(r<0.3)px(sx+((r*89)|0)%24,sy+((r*47)|0)%24,4,4,'#b89e66');break;
    case 3:{ px(sx,sy,TS,TS,'#2a6db5');
      const w=(frame>>4)%2;
      px(sx+4+w*4,sy+8,10,2,'#5c9bd6');px(sx+16-w*4,sy+22,10,2,'#5c9bd6');break;}
    case 4: px(sx,sy,TS,TS,'#8a8a8a');
      px(sx+4,sy+4,10,10,'#a3a3a3');px(sx+18,sy+16,10,10,'#6f6f6f');
      px(sx+2,sy+24,8,6,'#6f6f6f');break;
    case 5: px(sx,sy,TS,TS,'#3f8f3f');
      px(sx+2,sy+10,4,18,'#2c6e2c');px(sx+10,sy+6,4,22,'#2c6e2c');
      px(sx+18,sy+12,4,16,'#2c6e2c');px(sx+26,sy+8,4,20,'#2c6e2c');break;
    case 10: px(sx,sy,TS,TS,'#d8c58c');
      if(r<0.3)px(sx+((r*89)|0)%24,sy+((r*47)|0)%24,4,3,'#c4b076');break;
    case 11: px(sx,sy,TS,TS,'#b06040');
      if(r<0.35)px(sx+((r*89)|0)%24,sy+((r*47)|0)%24,5,4,'#9a4f33');break;
    case 8: px(sx,sy,TS,TS,'#8a8a8a');
      px(sx+4,sy+4,24,28,'#5d4037');px(sx+8,sy+8,16,24,'#4e342e');
      px(sx+13,sy+14,6,8,'#ffd54f');break;
    case 9: px(sx,sy,TS,TS,'#757575');
      px(sx,sy,TS,6,'#616161');px(sx+4,sy+10,6,8,'#37474f');
      px(sx+22,sy+10,6,8,'#37474f');px(sx+13,sy+20,6,12,'#37474f');
      break;
  }
  if(t===2){ // 木
    px(sx+12,sy+18,8,12,'#6d4c41');
    px(sx+2,sy+2,28,18,'#1e6b1e');px(sx+6,sy,20,8,'#1e6b1e');
    px(sx+6,sy+4,8,6,'#2f8f2f');
  }
  if(t===7){ // 家
    px(sx+2,sy+12,28,18,'#a1887f');
    px(sx,sy+2,32,12,'#c62828');
    px(sx+12,sy+18,8,12,'#4e342e');
  }
  if(t===6){ // 祠(鳥居風)
    px(sx+4,sy+4,24,4,'#c62828');px(sx+6,sy+10,20,3,'#c62828');
    px(sx+7,sy+8,4,22,'#c62828');px(sx+21,sy+8,4,22,'#c62828');
  }
}
function drawChar(sx,sy,dir,frame2,pal){
  const s=2; // 1ドット=2px、16x16ドット
  const P=(x,y,w,h,c)=>px(sx+x*s,sy+y*s,w*s,h*s,c);
  // 髪と顔
  P(4,0,8,2,pal.hair);P(3,1,10,3,pal.hair);
  if(dir==='up'){P(3,4,10,4,pal.hair);}
  else{
    P(3,4,10,4,pal.skin);P(3,4,1,4,pal.hair);P(12,4,1,4,pal.hair);
    if(dir==='down'){P(5,5,2,2,'#222');P(9,5,2,2,'#222');}
    if(dir==='left'){P(4,5,2,2,'#222');P(8,5,2,2,'#222');}
    if(dir==='right'){P(6,5,2,2,'#222');P(10,5,2,2,'#222');}
  }
  // 体
  P(3,8,10,5,pal.robe);
  P(2,9,2,3,pal.robe);P(12,9,2,3,pal.robe);
  P(3,12,10,1,pal.belt||'#333');

  const f=frame2%2;
  if(f===0){P(4,13,3,2,'#333');P(9,13,3,2,'#333');}
  else{P(3,13,3,2,'#333');P(10,13,3,2,'#333');}
}
function text(t,x,y,size,col,align){
  ctx.font='bold '+size+'px "Hiragino Kaku Gothic ProN","MS Gothic",monospace';
  ctx.fillStyle=col||'#fff';ctx.textAlign=align||'left';ctx.textBaseline='top';
  t.split('\n').forEach((line,i)=>ctx.fillText(line,x,y+i*(size+6)));
  ctx.textAlign='left';
}
function wrap(t,maxW,size){
  ctx.font='bold '+size+'px "Hiragino Kaku Gothic ProN","MS Gothic",monospace';
  const out=[];
  for(const raw of t.split('\n')){
    let line='';
    for(const ch of raw){
      if(ctx.measureText(line+ch).width>maxW){out.push(line);line=ch;}
      else line+=ch;
    }
    out.push(line);
  }
  return out.join('\n');
}
function box(x,y,w,h){
  px(x,y,w,h,'#101028');
  ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(x+4,y+4,w-8,h-8);
}
function hpbar(x,y,w,cur,max,col){
  px(x,y,w,10,'#333');
  px(x,y,Math.max(0,Math.round(w*cur/max)),10,col);
  ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(x,y,w,10);
}

      ["五腑","胆","小腸","胃","大腸","膀胱"],
      ["五官","目","舌","口","鼻","耳"],
      ["五主","筋","血脈","肌肉","皮毛","骨"],
      ["五志","怒","喜","思","悲","恐"],
      ["五味","酸","苦","甘","辛","鹹"],
      ["五色","青","赤","黄","白","黒"],
      ["五液","涙","汗","涎","涕","唾"],
      ["五華","爪","面","唇","毛","髪"]
    ];
    const colc=['#aaa','#66bb6a','#ef5350','#ffca28','#e0e0e0','#4fc3f7'];
    rows.forEach((row,ri)=>{
      row.forEach((cell,ci)=>{
        text(cell,L+ci*70,T+ri*30,15,ri===0?colc[ci]:(ci===0?'#ffd54f':'#fff'));
      });
    });
  }
  else if(p===2){
    text("【十二経脈の流注順序】",L,T,15,'#ffd54f');
    const flow=[
      "1 手太陰肺経      7 足太陽膀胱経",
      "2 手陽明大腸経    8 足少陰腎経",
      "3 足陽明胃経      9 手厥陰心包経",
      "4 足太陰脾経     10 手少陽三焦経",
      "5 手少陰心経     11 足少陽胆経",
      "6 手太陽小腸経   12 足厥陰肝経 →1へ"
    ];
    flow.forEach((f,i)=>text(f,L,T+28+i*26,14));
    text("手の三陰: 胸→手   手の三陽: 手→頭\n足の三陽: 頭→足   足の三陰: 足→胸腹",L,T+196,14,'#9fd6ff');
    text("【奇経八脈】 任脈(前正中・陰脈の海)\n督脈(後正中・陽脈の海) ほか計8本",L,T+252,14,'#ffd54f');
  }
  else if(p===3){
    const z=[
      ["肝(木)","蔵血・疏泄。筋・目・爪・怒・涙。将軍の官"],
      ["心(火)","血脈・神志。舌・面・喜・汗。君主の官"],
      ["脾(土)","運化・統血・昇清。肌肉・口・唇・思・涎"],
      ["肺(金)","主気・宣発粛降・通調水道。皮毛・鼻・悲・涕。相傅の官"],
      ["腎(水)","蔵精・主水・納気。骨・耳・髪・恐・唾。先天の本"],
      ["心包","心を包み守る。三焦と表裏"]
    ];
    z.forEach((r,i)=>{
      text(r[0],L,T+i*54,16,'#ffd54f');
      text(wrap(r[1],W-160,13),L+80,T+i*54+2,13);
    });
  }
  else if(p===4){
    const f=[
      ["胆","中正の官。決断を主る。胆汁を蔵す。肝と表裏"],
      ["小腸","受盛の官。受盛化物・清濁の分別。心と表裏"],
      ["胃","水穀の海。受納・腐熟・降濁。脾と表裏"],
      ["大腸","伝導の官。糟粕の伝導。肺と表裏"],
      ["膀胱","州都の官。貯尿・排尿。腎と表裏"],
      ["三焦","決瀆の官。水道を通調。上焦・中焦・下焦。心包と表裏"]
    ];
    f.forEach((r,i)=>{
      text(r[0],L,T+i*54,16,'#ffd54f');
      text(wrap(r[1],W-160,13),L+80,T+i*54+2,13);
    });
  }
}

function renderEnding(){
  px(0,0,W,H,'#0a0a1e');
  for(let i=0;i<40;i++){const r=hash2(i,7);px((r*W)|0,(hash2(i,13)*H)|0,2,2,'#889');}
  text("エンディング",W/2,60,22,'#ffd54f','center');
  text(wrap(ending.pages[ending.page],W-120,18),64,160,18);
  if((frame>>4)%2===0)text("▼ Z",W-64,H-48,16,'#ffd54f');
}

/* ================= メインループ ================= */
function loop(){
  frame++;
  if(state==='explore')updateExplore();
  px(0,0,W,H,'#000');
  switch(state){
    case 'title':renderTitle();break;
    case 'explore':renderExplore();break;
    case 'dialog':renderDialog();break;
    case 'battle':renderBattle();break;
    case 'menu':renderMenu();break;
    case 'ending':renderEnding();break;
  }
  requestAnimationFrame(loop);
}
loop();
</script>
